<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="ORIGEN - Cocina y territorio. Carta digital del restaurante.">
<title>ORIGEN · Carta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #21684c;
    --color-primary-dark: #194d39;
    --color-dark: #231f20;
    --color-bg: #fefefe;
    --color-bg-alt: #f7f5f1;
    --color-border: #e6e2db;
    --color-text: #231f20;
    --color-text-soft: #5a5550;
    --color-accent: #c9a961;
    --color-warning: #ff8c42;
    --shadow-sm: 0 1px 3px rgba(35,31,32,0.06);
    --shadow-md: 0 4px 12px rgba(35,31,32,0.08);
    --shadow-lg: 0 8px 24px rgba(35,31,32,0.12);
    --radius: 8px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.6;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--color-bg);
    padding: 28px 20px 20px;
    text-align: center;
    border-bottom: 1px solid var(--color-border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: rgba(254,254,254,0.96);
  }

  .logo {
    max-width: 220px;
    width: 60%;
    height: auto;
    display: block;
    margin: 0 auto 8px;
  }

  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--color-text-soft);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  /* LANGUAGE SELECTOR */
  .lang-selector {
    display: flex;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .lang-btn {
    background: transparent;
    border: 1px solid var(--color-border);
    color: var(--color-text-soft);
    padding: 5px 11px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .lang-btn:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);
  }

  .lang-btn.active {
    background: var(--color-primary);
    color: white;
    border-color: var(--color-primary);
  }

  /* MAIN CONTAINER */
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }

  /* ALLERGEN FILTER */
  .allergen-filter {
    background: var(--color-bg-alt);
    border-radius: var(--radius-lg);
    padding: 18px 18px;
    margin-bottom: 28px;
    border: 1px solid var(--color-border);
  }

  .filter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    gap: 12px;
  }

  .filter-title-block {
    flex: 1;
    min-width: 0;
  }

  .filter-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--color-dark);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }

  .filter-help {
    font-size: 0.78rem;
    color: var(--color-text-soft);
    font-style: italic;
  }

  .filter-toggle {
    background: var(--color-primary);
    color: white;
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }

  .allergen-filter.open .filter-toggle {
    transform: rotate(45deg);
  }

  .filter-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, margin-top 0.3s ease;
  }

  .allergen-filter.open .filter-content {
    max-height: 600px;
    margin-top: 16px;
  }

  .allergen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .allergen-chip {
    background: white;
    border: 1.5px solid var(--color-border);
    border-radius: 22px;
    padding: 8px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--color-text);
    transition: all 0.2s ease;
    font-family: inherit;
    text-align: left;
  }

  .allergen-chip:hover {
    border-color: var(--color-primary);
  }

  .allergen-chip.active {
    background: var(--color-primary);
    color: white;
    border-color: var(--color-primary);
  }

  .allergen-chip .emoji {
    font-size: 1rem;
    line-height: 1;
  }

  .allergen-chip .label {
    flex: 1;
    line-height: 1.2;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--color-border);
    color: var(--color-text-soft);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .clear-btn:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);
  }

  .clear-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .filter-status {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(33, 104, 76, 0.08);
    border-radius: var(--radius);
    font-size: 0.8rem;
    color: var(--color-primary);
    display: none;
  }

  .filter-status.visible {
    display: block;
  }

  /* SECTIONS */
  .section {
    margin-bottom: 44px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section.hidden { display: none; }

  .section-header {
    margin-bottom: 22px;
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--color-border);
  }

  .section-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.85rem;
    font-weight: 600;
    color: var(--color-dark);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .section-subtitle {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--color-text-soft);
    font-weight: 400;
  }

  /* HOY TENEMOS - Featured section */
  .section-hoy {
    background: linear-gradient(135deg, #fff8f0 0%, #fef4e8 100%);
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    border: 2px solid var(--color-warning);
    box-shadow: var(--shadow-md);
  }

  .section-hoy .section-header {
    border-bottom-color: rgba(255,140,66,0.3);
  }

  .section-hoy .section-title {
    color: var(--color-warning);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .section-hoy .section-title::before { content: "✦"; font-size: 1.2rem; }
  .section-hoy .section-title::after { content: "✦"; font-size: 1.2rem; }

  /* MENU CLASICOS - special section */
  .section-menu-degustacion {
    background: var(--color-bg-alt);
    border-radius: var(--radius-lg);
    padding: 28px 22px;
    border: 1px solid var(--color-border);
  }

  .section-menu-degustacion .section-title {
    color: var(--color-primary);
    font-style: italic;
  }

  .menu-price-block {
    text-align: center;
    margin: 18px 0 24px;
    padding: 14px 18px;
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--color-border);
  }

  .menu-price {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--color-primary);
    line-height: 1;
  }

  .menu-price small {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--color-text-soft);
    display: block;
    margin-top: 6px;
    font-style: italic;
  }

  .menu-pairing {
    font-size: 0.85rem;
    color: var(--color-text-soft);
    margin-top: 6px;
  }

  .menu-pairing strong {
    color: var(--color-primary);
    font-weight: 600;
  }

  .menu-footnote {
    margin-top: 22px;
    padding: 14px 16px;
    background: rgba(33, 104, 76, 0.05);
    border-left: 3px solid var(--color-primary);
    border-radius: 4px;
    font-size: 0.82rem;
    font-style: italic;
    color: var(--color-text-soft);
    line-height: 1.5;
  }

  /* DISH ITEMS */
  .dish-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .dish {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    align-items: baseline;
    border-bottom: 1px dotted rgba(35,31,32,0.1);
    transition: opacity 0.3s ease;
  }

  .dish:last-child { border-bottom: none; }

  .dish.filtered-out {
    display: none;
  }

  .dish-content { flex: 1; min-width: 0; }

  .dish-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.18rem;
    font-weight: 600;
    color: var(--color-dark);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .dish-description {
    font-size: 0.85rem;
    color: var(--color-text-soft);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .dish-allergens {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .allergen-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(35,31,32,0.05);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.7rem;
    color: var(--color-text-soft);
  }

  .allergen-tag .emoji { font-size: 0.85rem; }

  .dish-price {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--color-primary);
    flex-shrink: 0;
    line-height: 1;
    white-space: nowrap;
  }

  .dish-price small {
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--color-text-soft);
    display: block;
    margin-top: 4px;
    font-style: italic;
  }

  /* MENU TASTING - dishes look different */
  .section-menu-degustacion .dish {
    border-bottom-style: dotted;
    text-align: center;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .section-menu-degustacion .dish-content {
    text-align: center;
  }

  .section-menu-degustacion .dish-name {
    font-size: 1.1rem;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 36px 20px;
    color: var(--color-text-soft);
    font-style: italic;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text-soft);
  }

  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  .footer {
    background: var(--color-dark);
    color: rgba(255,255,255,0.75);
    padding: 30px 20px;
    text-align: center;
    font-size: 0.8rem;
    line-height: 1.6;
    margin-top: 40px;
    font-style: italic;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .header { padding: 22px 16px 16px; }
    .logo { width: 70%; max-width: 200px; }
    .container { padding: 16px 16px 40px; }
    .section { margin-bottom: 36px; }
    .section-title { font-size: 1.55rem; }
    .section-subtitle { font-size: 0.92rem; }
    .dish { padding: 12px 0; gap: 12px; }
    .dish-name { font-size: 1.08rem; }
    .dish-price { font-size: 1.25rem; }
    .menu-price { font-size: 1.7rem; }
    .lang-btn { padding: 4px 9px; font-size: 0.72rem; }
    .allergen-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 6px; }
    .allergen-chip { font-size: 0.72rem; padding: 7px 8px; }
    .filter-title { font-size: 1.05rem; }
    .filter-help { font-size: 0.72rem; }
    .section-hoy { padding: 20px 14px; }
    .section-menu-degustacion { padding: 22px 16px; }
  }

  @media (max-width: 380px) {
    .lang-btn { padding: 4px 7px; font-size: 0.68rem; }
    .allergen-chip .label { font-size: 0.7rem; }
  }

  /* ACCESSIBILITY */
  button:focus-visible, .lang-btn:focus-visible, .allergen-chip:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

    .trim();
}

// Parser CSV robusto que maneja comillas y comas dentro de campos
function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += ch; i++;
    } else {
      if (ch === '"') { inQuotes = true; i++; continue; }
      if (ch === ',') { row.push(field); field = ''; i++; continue; }
      if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
        i++; continue;
      }
      field += ch; i++;
    }
  }
  if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
  return rows;
}

/* ====================== CARGA DESDE GOOGLE SHEET ====================== */

async function loadFromSheet() {
  if (!SHEET_CSV_URL || SHEET_CSV_URL.trim() === '') {
    console.log('[ORIGEN] SHEET_CSV_URL vacía. Usando datos fallback.');
    return null;
  }
  console.log('[ORIGEN] Cargando datos desde Google Sheet:', SHEET_CSV_URL);
  try {
    const resp = await fetch(SHEET_CSV_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    console.log('[ORIGEN] CSV recibido, longitud:', text.length, 'caracteres');
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('CSV vacío o sin filas de datos');

    const headers = rows[0].map(normalizeHeader);
    console.log('[ORIGEN] Cabeceras detectadas:', headers);

    // Validar columnas mínimas
    const required = ['categoria', 'nombre'];
    for (const r of required) {
      if (!headers.includes(r)) {
        console.warn('[ORIGEN] Falta columna requerida:', r);
      }
    }

    const idxCat = headers.indexOf('categoria');
    const idxName = headers.indexOf('nombre');
    const idxDesc = headers.indexOf('descripcion');
    const idxPrice = headers.indexOf('precio');
    const idxExtra = headers.indexOf('extra');

    // Mapeo de cabeceras de alérgenos a IDs internos
    const allergenMap = {
      'gluten': 'gluten',
      'lacteos': 'lacteos',
      'huevo': 'huevo',
      'pescado': 'pescado',
      'frutos_secos': 'frutos_secos',
      'frutossecos': 'frutos_secos',
      'moluscos': 'moluscos',
      'soja': 'soja',
      'apio': 'apio',
      'mostaza': 'mostaza',
      'sesamo': 'sesamo',
      'sulfitos': 'sulfitos',
      'altramuces': 'altramuces',
      'crustaceos': 'crustaceos',
      'cacahuetes': 'cacahuetes'
    };
    const allergenColumns = {};
    headers.forEach((h, i) => {
      if (allergenMap[h]) allergenColumns[allergenMap[h]] = i;
    });
    console.log('[ORIGEN] Columnas de alérgenos:', allergenColumns);

    // Construir secciones respetando ORDEN del Sheet
    const sectionsByName = {};
    const sectionOrder = [];
    let dishCount = 0;

    for (let r = 1; r < rows.length; r++) {
      const row = rows[r];
      const cat = (row[idxCat] || '').trim();
      const name = (row[idxName] || '').trim();
      if (!cat && !name) continue;  // fila vacía
      if (!cat || !name) {
        console.warn('[ORIGEN] Fila ' + (r+1) + ' incompleta, saltando');
        continue;
      }

      if (!sectionsByName[cat]) {
        sectionsByName[cat] = {
          id: 'sheet_' + normalizeHeader(cat),
          rawName: cat,
          dishes: []
        };
        sectionOrder.push(cat);
      }

      const desc = idxDesc >= 0 ? (row[idxDesc] || '').trim() : '';
      const priceRaw = idxPrice >= 0 ? (row[idxPrice] || '').trim() : '';
      const price = priceRaw ? parseFloat(priceRaw.replace(',', '.').replace(/[^0-9.]/g, '')) : null;
      const extra = idxExtra >= 0 ? (row[idxExtra] || '').trim() : '';

      const allergens = [];
      for (const [aid, col] of Object.entries(allergenColumns)) {
        const val = (row[col] || '').trim().toLowerCase();
        if (val === 'x' || val === 'sí' || val === 'si' || val === 'yes' || val === '1' || val === 'true') {
          allergens.push(aid);
        }
      }

      sectionsByName[cat].dishes.push({
        id: 'sheet_' + r,
        rawName: name,
        rawDesc: desc,
        price: (isNaN(price) ? null : price),
        extra,
        allergens
      });
      dishCount++;
    }

    console.log('[ORIGEN] Secciones cargadas del Sheet:', sectionOrder);
    console.log('[ORIGEN] Total platos cargados del Sheet:', dishCount);

    return { sectionsByName, sectionOrder };
  } catch (err) {
    console.error('[ORIGEN] Error cargando Sheet:', err);
    console.log('[ORIGEN] Cayendo a datos fallback embebidos.');
    return null;
  }
}

/* ====================== CONSTRUIR DATOS FINALES ====================== */

function mergeSheetWithFallback(sheetResult) {
  /*
    Estrategia:
    - Si el Sheet aporta datos para una categoría conocida (por nombre normalizado en ES),
      esos platos REEMPLAZAN al fallback.
    - El orden de secciones lo dicta el Sheet cuando hay datos; las secciones
      que no aparecen en el Sheet se mantienen detrás (con fallback).
    - Los platos del Sheet sólo tienen versión ES; las traducciones quedan vacías
      (excepto si coincide el nombre con un plato del fallback, ahí se usan).
  */
  if (!sheetResult || !sheetResult.sectionOrder.length) {
    return SECTIONS_DATA;
  }

  // Indexar fallback por nombre ES normalizado (sección)
  const fallbackByEsName = {};
  SECTIONS_DATA.forEach(s => {
    const key = normalizeHeader(s.names.es);
    fallbackByEsName[key] = s;
  });

  // Indexar fallback dishes por nombre ES normalizado
  function findFallbackDish(esName) {
    const key = normalizeHeader(esName);
    for (const s of SECTIONS_DATA) {
      for (const d of s.dishes) {
        if (normalizeHeader(d.names.es) === key) return d;
      }
    }
    return null;
  }

  const result = [];
  const usedFallbackIds = new Set();

  // Procesar secciones en orden del Sheet
  sheetResult.sectionOrder.forEach(catName => {
    const sheetSec = sheetResult.sectionsByName[catName];
    const key = normalizeHeader(catName);
    const fbSec = fallbackByEsName[key];

    // Construir nombres traducidos: si hay fallback, usarlos; si no, usar nombre crudo
    const names = fbSec
      ? { ...fbSec.names }
      : { es: catName, en: catName, fr: catName, it: catName, pt: catName };

    const subtitle = fbSec ? fbSec.subtitle : null;
    const footnote = fbSec ? fbSec.footnote : null;

    if (fbSec) usedFallbackIds.add(fbSec.id);

    // Construir platos
    const dishes = sheetSec.dishes.map(sd => {
      const fbDish = findFallbackDish(sd.rawName);
      const names = fbDish
        ? { ...fbDish.names }
        : { es: sd.rawName, en: sd.rawName, fr: sd.rawName, it: sd.rawName, pt: sd.rawName };

      let descriptions;
      if (sd.rawDesc) {
        // Si el Sheet aporta descripción, la usamos en ES; el resto, igual o vacío
        descriptions = fbDish && fbDish.descriptions
          ? { ...fbDish.descriptions, es: sd.rawDesc }
          : { es: sd.rawDesc, en: sd.rawDesc, fr: sd.rawDesc, it: sd.rawDesc, pt: sd.rawDesc };
      } else if (fbDish) {
        descriptions = { ...fbDish.descriptions };
      } else {
        descriptions = { es: '', en: '', fr: '', it: '', pt: '' };
      }

      return {
        id: sd.id,
        names,
        descriptions,
        price: sd.price,
        extra: sd.extra || (fbDish ? fbDish.extra : ''),
        allergens: sd.allergens
      };
    });

    result.push({
      id: fbSec ? fbSec.id : sheetSec.id,
      names,
      subtitle,
      footnote,
      dishes
    });
  });

  // Añadir secciones del fallback que no estaban en el Sheet
  SECTIONS_DATA.forEach(s => {
    if (!usedFallbackIds.has(s.id)) {
      result.push(s);
    }
  });

  console.log('[ORIGEN] Datos finales: ' + result.length + ' secciones, ' +
              result.reduce((acc, s) => acc + s.dishes.length, 0) + ' platos');
  return result;
}

/* ====================== RENDER ====================== */

function t(key) {
  return (UI[currentLang] && UI[currentLang][key]) || UI.es[key] || key;
}

function getDishName(dish) {
  // Si la sección es "hoy_tenemos", siempre mostrar en español (instrucciones del cliente)
  // Esto se gestiona en renderSection
  return dish.names[currentLang] || dish.names.es || '';
}

function getDishDescription(dish) {
  return (dish.descriptions && (dish.descriptions[currentLang] || dish.descriptions.es)) || '';
}

function dishMatchesFilter(dish) {
  if (activeAllergenFilters.size === 0) return true;
  // El plato pasa si NO contiene ninguno de los alérgenos filtrados
  for (const a of activeAllergenFilters) {
    if (dish.allergens && dish.allergens.includes(a)) return false;
  }
  return true;
}

function renderAllergenChips() {
  const grid = document.getElementById('allergenGrid');
  grid.innerHTML = '';
  const order = ['gluten','lacteos','huevo','pescado','crustaceos','moluscos','frutos_secos','cacahuetes','soja','apio','mostaza','sesamo','sulfitos','altramuces'];
  order.forEach(aid => {
    const a = ALLERGENS[aid];
    if (!a) return;
    const btn = document.createElement('button');
    btn.className = 'allergen-chip';
    btn.dataset.allergen = aid;
    btn.setAttribute('aria-pressed', 'false');
    btn.innerHTML = '<span class="emoji">' + a.emoji + '</span><span class="label">' + (a[currentLang] || a.es) + '</span>';
    btn.addEventListener('click', () => toggleAllergen(aid));
    if (activeAllergenFilters.has(aid)) {
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
    }
    grid.appendChild(btn);
  });
}

function toggleAllergen(aid) {
  if (activeAllergenFilters.has(aid)) {
    activeAllergenFilters.delete(aid);
  } else {
    activeAllergenFilters.add(aid);
  }
  renderAllergenChips();
  renderMenu();
  updateFilterStatus();
}

function clearFilters() {
  activeAllergenFilters.clear();
  renderAllergenChips();
  renderMenu();
  updateFilterStatus();
}

function updateFilterStatus() {
  const status = document.getElementById('filterStatus');
  const clearBtn = document.getElementById('clearBtn');
  if (activeAllergenFilters.size === 0) {
    status.classList.remove('visible');
    clearBtn.disabled = true;
    return;
  }
  clearBtn.disabled = false;
  // Contar platos visibles vs totales
  let total = 0, visible = 0;
  menuData.forEach(s => {
    s.dishes.forEach(d => {
      total++;
      if (dishMatchesFilter(d)) visible++;
    });
  });
  status.classList.add('visible');
  status.textContent = '✓ ' + t('showing') + ' ' + visible + ' ' + t('of') + ' ' + total + ' ' + t('all_dishes').toLowerCase();
}

function renderMenu() {
  const container = document.getElementById('menuContent');
  container.innerHTML = '';

  let anyVisible = false;

  menuData.forEach(section => {
    const sectionEl = document.createElement('section');
    sectionEl.className = 'section';
    if (section.id === 'hoy_tenemos') sectionEl.classList.add('section-hoy');
    if (section.id === 'menu_clasicos') sectionEl.classList.add('section-menu-degustacion');

    // Header
    const header = document.createElement('div');
    header.className = 'section-header';

    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = section.names[currentLang] || section.names.es;
    header.appendChild(title);

    if (section.subtitle) {
      const sub = document.createElement('p');
      sub.className = 'section-subtitle';
      sub.textContent = section.subtitle[currentLang] || section.subtitle.es;
      header.appendChild(sub);
    }
    sectionEl.appendChild(header);

    // Hoy tenemos: si está vacío, mostrar mensaje
    if (section.id === 'hoy_tenemos' && (!section.dishes || section.dishes.length === 0)) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = t('no_dishes_today');
      sectionEl.appendChild(empty);
      container.appendChild(sectionEl);
      return;
    }

    // Render dishes
    const list = document.createElement('div');
    list.className = 'dish-list';

    let visibleInSection = 0;

    section.dishes.forEach(dish => {
      const matches = dishMatchesFilter(dish);
      if (!matches) return;
      visibleInSection++;
      anyVisible = true;

      const dishEl = document.createElement('article');
      dishEl.className = 'dish';

      const content = document.createElement('div');
      content.className = 'dish-content';

      const nameEl = document.createElement('h3');
      nameEl.className = 'dish-name';
      // "Hoy tenemos" siempre en español
      const dishName = section.id === 'hoy_tenemos'
        ? (dish.names.es || dish.names[currentLang] || '')
        : (dish.names[currentLang] || dish.names.es || '');
      nameEl.textContent = dishName;
      content.appendChild(nameEl);

      const dishDesc = section.id === 'hoy_tenemos'
        ? (dish.descriptions && dish.descriptions.es) || ''
        : ((dish.descriptions && (dish.descriptions[currentLang] || dish.descriptions.es)) || '');
      if (dishDesc) {
        const descEl = document.createElement('p');
        descEl.className = 'dish-description';
        descEl.textContent = dishDesc;
        content.appendChild(descEl);
      }

      // Allergen tags
      if (dish.allergens && dish.allergens.length > 0) {
        const tags = document.createElement('div');
        tags.className = 'dish-allergens';
        dish.allergens.forEach(aid => {
          const a = ALLERGENS[aid];
          if (!a) return;
          const tag = document.createElement('span');
          tag.className = 'allergen-tag';
          tag.title = t('contains') + ': ' + (a[currentLang] || a.es);
          tag.innerHTML = '<span class="emoji">' + a.emoji + '</span><span>' + (a[currentLang] || a.es) + '</span>';
          tags.appendChild(tag);
        });
        content.appendChild(tags);
      }

      dishEl.appendChild(content);

      // Price (no se muestra en menú degustación con precio único)
      if (dish.price !== null && dish.price !== undefined && dish.price !== '') {
        const priceEl = document.createElement('div');
        priceEl.className = 'dish-price';
        priceEl.textContent = dish.price + '€';
        dishEl.appendChild(priceEl);
      }

      list.appendChild(dishEl);
    });

    // Si la sección está vacía tras filtrar, ocultar
    if (visibleInSection === 0 && (!section.dishes || section.dishes.length > 0)) {
      // Hay platos pero ninguno pasa el filtro → ocultar sección
      return;
    }

    sectionEl.appendChild(list);

    // Menú degustación: bloque de precio y nota
    if (section.id === 'menu_clasicos') {
      const priceBlock = document.createElement('div');
      priceBlock.className = 'menu-price-block';
      priceBlock.innerHTML = '<div class="menu-price">45€<small>' + t('menu_price') + '</small></div>' +
        '<p class="menu-pairing"><strong>+18€</strong> ' + t('menu_pairing') + ' (4 vinos)</p>';
      // Insertar el bloque ANTES de la lista
      sectionEl.insertBefore(priceBlock, list);

      if (section.footnote) {
        const note = document.createElement('p');
        note.className = 'menu-footnote';
        note.textContent = section.footnote[currentLang] || section.footnote.es;
        sectionEl.appendChild(note);
      }
    }

    container.appendChild(sectionEl);
  });

  if (!anyVisible && activeAllergenFilters.size > 0) {
    container.innerHTML = '<div class="empty-state">' + t('no_results') + '</div>';
  }
}

/* ====================== UI - IDIOMA ====================== */

function setLanguage(lang) {
  if (!UI[lang]) return;
  currentLang = lang;
  document.documentElement.lang = lang;

  // Botones
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  // Textos UI
  document.getElementById('filterTitle').textContent = '⚠ ' + t('filter_allergens');
  document.getElementById('filterHelp').textContent = t('filter_help');
  document.getElementById('clearBtn').textContent = t('clear_filters');
  document.getElementById('footerText').textContent = t('footer_note');
  const loadingEl = document.getElementById('loadingText');
  if (loadingEl) loadingEl.textContent = t('loading');

  renderAllergenChips();
  renderMenu();
  updateFilterStatus();
}

/* ====================== INIT ====================== */

document.addEventListener('DOMContentLoaded', async () => {
  console.log('[ORIGEN] Inicializando carta digital...');

  // Listeners
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
  });

  document.getElementById('clearBtn').addEventListener('click', clearFilters);

  const filter = document.getElementById('allergenFilter');
  const filterHeader = document.getElementById('filterHeader');
  filterHeader.addEventListener('click', () => {
    filter.classList.toggle('open');
    filterHeader.setAttribute('aria-expanded', filter.classList.contains('open'));
  });
  filterHeader.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      filterHeader.click();
    }
  });

  // Render inicial de chips para que estén disponibles
  renderAllergenChips();

  // Cargar datos
  const sheetResult = await loadFromSheet();
  menuData = mergeSheetWithFallback(sheetResult);

  // Render inicial
  renderMenu();
  updateFilterStatus();

  console.log('[ORIGEN] Listo.');
});
</script>
